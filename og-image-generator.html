<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>OG Image Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Aboreto&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 40px;
      background: #888;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }
    p.instructions {
      font-family: Inter, sans-serif;
      color: #fff;
      font-size: 14px;
      max-width: 1200px;
      text-align: center;
    }
    .og-card {
      width: 1200px;
      height: 430px;
      background: #1E1E1E;
      display: flex;
      align-items: center;
      padding: 0 100px;
      gap: 60px;
      box-sizing: border-box;
      position: relative;
      overflow: hidden;
    }
    .og-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, #2BE4C2, #8B9FD6, #C4B5E0);
    }
    .photo-container {
      flex-shrink: 0;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      overflow: hidden;
      border: 4px solid #2BE4C2;
      box-shadow: 0 0 40px rgba(43, 228, 194, 0.2);
    }
    .photo-container img {
      width: 80%;
      height: 80%;
      object-fit: cover;
      object-position: top;
      margin: 20% auto 0;
      display: block;
    }
    .text-content {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .name {
      font-family: 'Aboreto', serif;
      font-size: 56px;
      color: #ffffff;
      letter-spacing: 4px;
      line-height: 1.1;
      margin: 0;
    }
    .role {
      font-family: 'Inter', sans-serif;
      font-size: 28px;
      color: #2BE4C2;
      letter-spacing: 6px;
      text-transform: uppercase;
      margin: 0;
      font-weight: 400;
    }
    .url {
      font-family: 'Inter', sans-serif;
      font-size: 18px;
      color: #8B9FD6;
      margin: 0;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <p class="instructions">
    Haz clic derecho en la tarjeta → "Inspeccionar" → selecciona el div .og-card → clic derecho → "Capture node screenshot"<br>
    O usa una extensión de captura de pantalla para guardarla como PNG a 1200×630px.<br>
    Luego guárdala como <strong>public/images/og-image.png</strong>
  </p>
  <div class="og-card">
    <div class="photo-container">
      <img src="public/images/oswaldo-teran/oswaldo-teran.png" alt="Oswaldo Terán">
    </div>
    <div class="text-content">
      <h1 class="name">OSWALDO TERÁN</h1>
      <p class="role">Web Developer</p>
    </div>
  </div>
</body>
</html>
